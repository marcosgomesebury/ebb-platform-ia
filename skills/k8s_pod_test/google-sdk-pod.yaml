apiVersion: v1
kind: Pod
metadata:
  name: test-wi-debug
  namespace: core
spec:
  serviceAccountName: ebb-account
  containers:
  - name: test
    image: google/cloud-sdk:slim
    command: ["/bin/sh"]
    args:
    - -c
    - |
      echo "Testing Workload Identity..."
      echo "1. Checking gcloud auth:"
      gcloud auth list
      echo ""
      echo "2. Checking metadata server:"
      curl -s -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/email
      echo ""
      echo "3. Testing ADC:"
      gcloud auth application-default print-access-token 2>&1 | head -5
      echo ""
      echo "Done. Sleeping..."
      sleep 300
  restartPolicy: Never
